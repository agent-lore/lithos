# Lithos Docker Compose configuration
services:
  lithos:
    image: ${LITHOS_IMAGE:-lithos:local}
    pull_policy: never
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lithos
    user: "${LITHOS_UID:-1000}:${LITHOS_GID:-1000}"
    restart: unless-stopped
    volumes:
      - ${LITHOS_DATA_PATH:-./data}:/data
    ports:
      - "8765:8765"
    environment:
      - LITHOS_DATA_DIR=/data
      - LITHOS_HOST=0.0.0.0
      - LITHOS_PORT=8765
      - LITHOS_OTEL_ENABLED=${LITHOS_OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

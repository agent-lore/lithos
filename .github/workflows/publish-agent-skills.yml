name: Publish Agent Skills

on:
  push:
    branches: [main]
    paths:
      - 'agent-skills/**'
      - '.github/workflows/publish-agent-skills.yml'
  workflow_dispatch:  # allow manual trigger from the GitHub UI

permissions:
  id-token: write   # Required for OIDC repo linking

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Publish plugins
        working-directory: agent-skills
        run: |
          tessl plugin publish ./plugins/lithos --bump patch
          tessl plugin publish ./plugins/influx-inbox --bump patch

# Architecture model for the "diagrams as tests" guardrail.
#
# This file is the single source of truth for:
#   - the generated component diagram (tests/guardrail/test_architecture_diagram.py)
#   - which modules are scanned for the domain class diagram
#
# The directional layering contract itself lives in pyproject.toml
# ([tool.importlinter]); the tiers below are documentation of that intent and
# drive how the component diagram is grouped.
#
# `component_of()` matches a module to a component by LONGEST module-prefix,
# so "lithos.lcma" also captures "lithos.lcma.scouts" etc.
#
# PORTING TO ANOTHER PROJECT: the tests/guardrail/ kit is project-agnostic —
# to reuse it, copy tests/guardrail/ + this file and edit only this file:
#   1. [project] below (root_package + src_layout),
#   2. [components]/[tiers] to your modules,
#   3. [domain]/[tool_catalog] scan lists and [budgets] to your measured values.
# No code changes required.

[project]
# Root importable package and the directory holding it (src-layout). For a flat
# layout with the package at the repo root, set src_layout = "".
root_package = "lithos"
src_layout   = "src"

[components]
Entrypoints     = ["lithos.cli", "lithos.server", "lithos.tools", "lithos.watch_intake", "lithos.__main__"]
Knowledge       = ["lithos.knowledge", "lithos.reconcile", "lithos._merge"]
Search          = ["lithos.search"]
Graph           = ["lithos.graph", "lithos.edge_store"]
Coordination    = ["lithos.coordination"]
Intake          = ["lithos.intake"]
Provenance      = ["lithos.provenance"]
CognitiveMemory = ["lithos.cognitive_memory"]
LCMA            = ["lithos.lcma"]
Events          = ["lithos.events"]
Config          = ["lithos.config"]
Telemetry       = ["lithos.telemetry"]
Errors          = ["lithos.errors", "lithos.envelopes"]
Logging         = ["lithos.logging_config"]

# Tiers are for diagram grouping + documentation of the forbidden-import contract.
# Dependencies must only point downward (Entrypoints -> Core -> Foundation).
[tiers]
Entrypoints = ["Entrypoints"]
Core        = ["Knowledge", "Search", "Graph", "Coordination", "Intake", "Provenance", "CognitiveMemory", "LCMA"]
Foundation  = ["Events", "Config", "Telemetry", "Errors", "Logging"]

# Hard architecture budgets, checked by tests/guardrail/test_metrics_budgets.py
# against the metrics snapshot (docs/generated/metrics.md explains each one).
# CI fails if a measured value exceeds its budget. Raising a budget is allowed
# but must be an explicit, reviewed edit to this file; lower a budget after
# improving the code to lock in the gain.
[budgets]
cross_component_edges  = 63    # measured 2026-07; direction: down
component_cycles       = 1    # one 6-component SCC in Core (Coordination/Graph/Knowledge/LCMA/Provenance/Search); goal: shrink it
module_cycles          = 2    # knowledge<->graph<->search<->provenance<->lcma.edges, server<->tools; goal: 0
modules_over_800_lines = 11   # incl. tools.tasks (985) split from server in #374; direction: down
max_module_lines       = 2800 # stop-loss; largest today is coordination.py at 2675

# MCP tool surface: modules scanned for @…tool()-decorated handlers (counted in
# the metrics snapshot; catalogued in docs/generated/tool_catalog.md). A project
# with no MCP tools can leave this empty.
[tool_catalog]
include_modules = ["lithos.tools", "lithos.server"]
# Public server methods a handler may touch that are NOT a component boundary
# (so the completeness check doesn't flag them).
ignore_attrs = ["initialize"]

# server.<attr> -> component, for the catalog's "Touches" column. A handler that
# reaches an unmapped, non-ignored server attribute fails test_tool_catalog.
[tool_catalog.component_attrs]
coordination = "Coordination"
knowledge    = "Knowledge"
search       = "Search"
graph        = "Graph"
edge_store   = "Graph"
intake       = "Intake"
projection   = "Provenance"
memory       = "CognitiveMemory"
event_bus    = "Events"
_emit        = "Events"        # server-local wrapper around event_bus.emit
watch_intake = "Entrypoints"

# Domain class diagram: which modules to scan for dataclasses / Pydantic models.
# test_domain_model_diagram asserts EVERY public model's module is in include or
# exclude — so a new model in an unlisted module fails until it is classified.
[domain]
include_modules = [
    "lithos.coordination",
    "lithos.graph",
    "lithos.events",
    "lithos.knowledge",
    "lithos.provenance",
    "lithos.cognitive_memory",
    "lithos.intake",
    "lithos.search",
]
# Not domain entities: config/settings, error types, and LCMA-internal pipeline
# working types (e.g. lcma.utils.Candidate).
exclude_modules = ["lithos.config", "lithos.errors", "lithos.lcma"]

# Container / data-store view (docs/generated/containers.md). Store topology is
# deployment knowledge, not derivable from imports — declared here, but every
# store is anchored to a StorageConfig property (src/lithos/config.py) and
# test_container_diagram fails if a *_path/*_db_path property is added, renamed,
# or removed without updating this list. Roles use the CONTEXT.md vocabulary.
[containers]
ignore_properties = ["lithos_store_path"]  # base dir that contains the stores below

[[containers.stores]]
id = "corpus"
label = "Corpus — Markdown notes"
config_property = "knowledge_path"
owner = "Knowledge"
role = "source_of_truth"

[[containers.stores]]
id = "edges_db"
label = "edges.db — asserted edges (+ projection rows)"
config_property = "edges_db_path"
owner = "Graph"
role = "source_of_truth"      # ADR-0006: asserted rows authoritative; projection rows are derived
engine = "SQLite"

[[containers.stores]]
id = "tantivy_index"
label = "Full-text index"
config_property = "tantivy_path"
owner = "Search"
role = "derived_view"
derived_from = "corpus"
engine = "Tantivy"

[[containers.stores]]
id = "chroma_index"
label = "Semantic index"
config_property = "chroma_path"
owner = "Search"
role = "derived_view"
derived_from = "corpus"
engine = "ChromaDB + embeddings"

[[containers.stores]]
id = "graph_cache"
label = "Wiki-link graph cache"
config_property = "graph_path"
owner = "Graph"
role = "derived_view"
derived_from = "corpus"
engine = "NetworkX"

[[containers.stores]]
id = "coordination_db"
label = "coordination.db — tasks, claims, findings, agents"
config_property = "coordination_db_path"
owner = "Coordination"
role = "agent_state"
engine = "SQLite"

[[containers.stores]]
id = "stats_db"
label = "stats.db — salience, retrieval, coactivation"
config_property = "stats_db_path"
owner = "CognitiveMemory"
role = "agent_state"
engine = "SQLite"
